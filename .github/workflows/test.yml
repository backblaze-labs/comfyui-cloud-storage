name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Tests import torch / Pillow / numpy / torchaudio (normally provided
          # by the host ComfyUI install). Install them explicitly here.
          pip install boto3 numpy Pillow torch torchaudio typing_extensions
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v
